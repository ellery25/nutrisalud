name: nutrisalud
description: "NutriSalud — your personal nutrition companion. Meal discovery, digestive health, food journaling and nutrition goals."
publish_to: "none"

# Versioning: semantic. Bump build number on every store upload.
version: 2.0.0+2

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # --- State management ---
  flutter_riverpod: ^2.6.1

  # --- Routing ---
  go_router: ^14.8.1

  # --- Networking ---
  http: ^1.3.0

  # --- Storage ---
  shared_preferences: ^2.5.2
  flutter_secure_storage: ^9.2.4

  # --- UI ---
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1

  # --- Firebase / push notifications ---
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # --- Platform / misc ---
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  flutter_image_compress: ^2.4.0
  intl: ^0.20.2

  # --- Tooling (build-time only) ---
  flutter_native_splash: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_native_splash:
  android: true
  color: "#FAFAF7"
  color_dark: "#121512"
  image: "assets/imgs/splashNutrisalud.png"

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/imgs/launcherIcon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/imgs/
    - assets/imgs/IntroductionImages/
    - assets/imgs/ProfilePhotos/
    - assets/svgs/
